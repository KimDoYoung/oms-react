server.port=8686
server.servlet.context-path=/oms
spring.application.name=oms
spring.application.version=0.0.1
spring.application.description=OMS API Server

# Database - PostgreSQL
spring.datasource.url=${OMS_DB_URL:jdbc:postgresql://localhost:5432/oms}
spring.datasource.username=${OMS_DB_USERNAME:postgres}
spring.datasource.password=${OMS_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

data.redis.host=${OMS_REDIS_HOST:localhost}
data.redis.port=${OMS_REDIS_PORT:6379}
data.redis.password=${OMS_REDIS_PASSWORD:}

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JWT
jwt.secret=${OMS_JWT_SECRET:99e5c5ee0cce05e2308ad8697d02947cb18e1b80d2059ec2e0830ec2396a94878691c45c7e964c077ee2dbfb000ac526}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# SpringDoc OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.show-actuator=true
springdoc.swagger-ui.enable=false

# Jackson
spring.jackson.time-zone=Asia/Seoul

# DevTools
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Multipart File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# MyBatis
mybatis.mapper-locations=classpath:mapper/**/*.xml,classpath:kr/co/kfs/asset/oms/domain/**/mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
